<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CEAGESP - Evolução de Preços</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin:0; font-family: 'Segoe UI', Arial; background:#f0f2f5; }
        header { background:#b71c1c; color:white; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
        .container { padding:20px; max-width: 1400px; margin: auto; }
        .box { background:white; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); margin-bottom:20px; }
        .filters { display:flex; flex-wrap:wrap; gap:15px; align-items:flex-end; }
        input, button { padding:12px; border-radius:8px; border:1px solid #ccc; outline: none; }
        button { background:#b71c1c; color:white; cursor:pointer; border:none; font-weight:bold; }
        button:hover { background:#8e1616; }
        
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; text-align: center; border-left: 5px solid #b71c1c; }
        .stat-card h4 { margin: 0; color: #666; font-size: 14px; }
        .stat-card p { margin: 10px 0 0; font-size: 22px; font-weight: bold; color: #b71c1c; }

        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        .card-chart { background:white; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        h3 { color:#b71c1c; margin-top:0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        canvas { width:100% !important; height:300px !important; }
        
        #status { font-weight: bold; color: #2e7d32; margin-left: 10px; }
    </style>
</head>
<body>

<header>
    <h2>CEAGESP - Painel de Preços</h2>
  
</header>

<div class="container">
    <div class="box">
     
        <div class="filters" style="margin-top: 15px;">
            <div style="flex:1">
                <label>Cultura:</label><br>
                <input list="produtos" id="produtoInput" placeholder="Ex: BANANA" style="width:100%">
                <datalist id="produtos"></datalist>
            </div>
            <button onclick="processarAnalise()">Gerar Análise Completa</button>
        </div>
    </div>

    <div class="stats-row" id="resumo" style="display:none;">
        <div class="stat-card"><h4>Média Histórica (Todos os Anos)</h4><p id="media-geral">R$ 0,00</p></div>
        <div class="stat-card"><h4>Unidade de Medida</h4><p id="unidade-medida">-</p></div>
        <div class="stat-card"><h4>Maior Preço Registrado</h4><p id="max-geral">R$ 0,00</p></div>
    </div>

    <div class="charts-grid" id="dashboard">
        <div class="card-chart">
            <h3>Média Mensal (Sazonalidade)</h3>
            <canvas id="chartSazonalidade"></canvas>
        </div>
        <div class="card-chart">
            <h3>Evolução de Preço por Ano</h3>
            <canvas id="chartAnual"></canvas>
        </div>
    </div>
    
    <h2 id="titulo-detalhado" style="margin-top:40px; color:#b71c1c; display:none;">Detalhamento Mensal por Ano</h2>
    <div class="charts-grid" id="grid-anos"></div>
</div>

<script>
let dadosRaw = [];
let listaCharts = [];

/* 🚀 CARREGAMENTO AUTOMÁTICO AO ABRIR */
window.onload = carregarDadosGit;

/* 🔗 FUNÇÃO PARA CARREGAR DO GITHUB */
function carregarDadosGit(){

    const url = "https://raw.githubusercontent.com/nicol-le/Ceagesp/refs/heads/main/0089%20PRE%C3%87OS%20ETSP%20CEAGESP%202020%20A%202026_03%20UFSCAR%20HORTALI%C3%87AS%20-%202023%20A%202025.csv";

    document.getElementById('status').innerText = "Carregando dados do servidor...";

    Papa.parse(url, {
        download: true,
        header: true,
        skipEmptyLines: true,
        worker: true,
        complete: function(results){

            // 🔥 LIMPEZA DE DADOS (IMPORTANTE)
            dadosRaw = results.data.map(row => {
                let n = {};
                for (let k in row) n[k.trim()] = row[k];
                return n;
            });

            document.getElementById('status').innerText = "Dados carregados automaticamente!";
            popularDatalist();
        },
        error: function(err){
            console.error(err);
            document.getElementById('status').innerText = "Erro ao carregar dados!";
        }
    });
}

/* 🔎 AUTOCOMPLETE */
function popularDatalist() {
    let produtos = [...new Set(dadosRaw.map(d => d.Produto))]
        .filter(Boolean)
        .sort();

    let dl = document.getElementById('produtos');
    dl.innerHTML = "";

    produtos.forEach(p => {
        let opt = document.createElement('option');
        opt.value = p;
        dl.appendChild(opt);
    });
}

/* 📊 PROCESSAMENTO E GRÁFICOS */
function processarAnalise() {

    const prodSelecionado = document.getElementById('produtoInput').value.toUpperCase();

    if (!prodSelecionado) {
        alert("Selecione um produto");
        return;
    }

    // 🔥 LIMPAR GRÁFICOS ANTIGOS
    listaCharts.forEach(c => c.destroy());
    listaCharts = [];
    document.getElementById('grid-anos').innerHTML = "";

    // 🔎 FILTRO
    const filtrados = dadosRaw.filter(d =>
        d.Produto && d.Produto.toUpperCase() === prodSelecionado
    );

    if (filtrados.length === 0) {
        alert("Produto não encontrado.");
        return;
    }

    // 📊 ORGANIZAÇÃO DOS DADOS
    let porAno = {};
    let porMesGeral = {};
    let somaGeral = 0;
    let maxGeral = 0;
    let unidade = filtrados[0].Unidade || "KG";

    filtrados.forEach(d => {

        let preco = parseFloat(String(d.Comum).replace(',', '.'));
        if (isNaN(preco)) return;

        let ano = d.ano;
        let mes = (d.MÊS || "").toLowerCase();

        somaGeral += preco;
        if (preco > maxGeral) maxGeral = preco;

        // Por ano
        if (!porAno[ano]) porAno[ano] = {};
        if (!porAno[ano][mes]) porAno[ano][mes] = [];
        porAno[ano][mes].push(preco);

        // Sazonalidade geral
        if (!porMesGeral[mes]) porMesGeral[mes] = [];
        porMesGeral[mes].push(preco);
    });

    /* 📈 CARDS */
    document.getElementById('resumo').style.display = 'grid';
    document.getElementById('media-geral').innerText =
        `R$ ${(somaGeral / filtrados.length).toFixed(2)}`;

    document.getElementById('unidade-medida').innerText = unidade;

    document.getElementById('max-geral').innerText =
        `R$ ${maxGeral.toFixed(2)}`;

    /* 📅 ORDEM DOS MESES */
    const mesesOrdem = [
        "janeiro","fevereiro","março","abril","maio","junho",
        "julho","agosto","setembro","outubro","novembro","dezembro"
    ];

    /* 📊 SAZONALIDADE */
    let valoresSazonalidade = mesesOrdem.map(m => {
        let v = porMesGeral[m] || [];
        return v.length ? (v.reduce((a,b)=>a+b,0)/v.length).toFixed(2) : 0;
    });

    gerarChart("chartSazonalidade","bar",mesesOrdem,valoresSazonalidade,
        `Média Histórica (R$ / ${unidade})`);

    /* 📈 EVOLUÇÃO ANUAL */
    let anosLabels = Object.keys(porAno).sort();

    let valoresAnuais = anosLabels.map(a => {
        let soma = 0, cont = 0;

        for (let m in porAno[a]) {
            soma += porAno[a][m].reduce((x,y)=>x+y,0);
            cont += porAno[a][m].length;
        }

        return (soma / cont).toFixed(2);
    });

    gerarChart("chartAnual","line",anosLabels,valoresAnuais,
        "Média por Ano (R$)");

    /* 📊 GRÁFICOS POR ANO */
    document.getElementById('titulo-detalhado').style.display = 'block';

    anosLabels.forEach(ano => {

        const div = document.createElement('div');
        div.className = 'card-chart';
        div.innerHTML = `<h3>Ano: ${ano}</h3><canvas id="chart-${ano}"></canvas>`;

        document.getElementById('grid-anos').appendChild(div);

        let valoresMesesAno = mesesOrdem.map(m => {
            let v = porAno[ano][m] || [];
            return v.length ? (v.reduce((a,b)=>a+b,0)/v.length).toFixed(2) : 0;
        });

        gerarChart(`chart-${ano}`, "bar", mesesOrdem, valoresMesesAno, `Preços em ${ano}`);
    });
}

/* 📊 FUNÇÃO DE GRÁFICO (ALTA QUALIDADE) */
function gerarChart(id, tipo, labels, data, label) {

    let canvas = document.getElementById(id);
    let dpi = window.devicePixelRatio || 1;
    let rect = canvas.getBoundingClientRect();

    canvas.width = rect.width * dpi;
    canvas.height = rect.height * dpi;

    let ctx = canvas.getContext('2d');
    ctx.scale(dpi, dpi);

    const chart = new Chart(ctx, {
        type: tipo,
        data: {
            labels: labels,
            datasets: [{
                label: label,
                data: data,
                backgroundColor: tipo === 'line' ? 'transparent' : 'rgba(183,28,28,0.7)',
                borderColor: '#b71c1c',
                borderWidth: 2,
                tension: 0.3,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: false }
            }
        }
    });

    listaCharts.push(chart);
}
</script>
</body>
</html>
